services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lankoping-web
    restart: always
    expose:
      - "3000"
    environment:
      - PORT=3000
      - NITRO_HOST=0.0.0.0
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:postgres@db:5432/lankoping
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: lankoping-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: lankoping
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:
